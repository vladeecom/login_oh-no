<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в аккаунт</title>
  <meta name="description" content="Авторизация">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/img/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <link rel="shortcut icon" href="/img/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/style.css">
  <meta name="apple-mobile-web-app-title" content="Oh-no!">
  <link rel="manifest" href="/img/site.webmanifest">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    /* ==================== CSS Variables ==================== */
    :root {
      --color-bg-dark: #0a0a0a;
      --color-bg-card: #1a1a1a;
      --color-bg-hover: #252525;
      --color-text-primary: #ffffff;
      --color-text-secondary: #a0a0a0;
      --color-accent: #f4c430;
      --color-accent-hover: #ddb028;
      --color-accent-glow: rgba(244, 196, 48, 0.4);
      --color-border: rgba(255, 255, 255, 0.1);
      --color-error-red: #ff4d4d;
      --max-width: 1200px;
      --spacing-xs: 8px;
      --spacing-sm: 16px;
      --spacing-md: 24px;
      --spacing-lg: 48px;
      --spacing-xl: 72px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-20px); }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Roboto', Arial, sans-serif;
      background-color: var(--color-bg-dark);
      color: var(--color-text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--spacing-md);
    }

    /* ==================== Header ==================== */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--color-border);
      z-index: 1000;
      padding: var(--spacing-sm) 0;
    }

    .header-content {
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }

    .logo {
      height: 40px;
      display: block;
      flex-shrink: 0;
      max-width: 120px;
      cursor: pointer;
      color: var(--color-accent);
      transition: color .2s;
      text-decoration: none;
    }
    .logo-svg { height: 100%; width: auto; display: block; }
    .logo:hover { color: var(--color-accent-hover); }

    /* ==================== Login Page ==================== */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px var(--spacing-md) var(--spacing-lg);
      position: relative;
      overflow: hidden;
    }

    /* Фоновое свечение */
    .login-page::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, var(--color-accent-glow) 0%, transparent 70%);
      opacity: 0.12;
      animation: float 10s ease-in-out infinite;
      pointer-events: none;
    }
    .login-page::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--color-accent-glow) 0%, transparent 70%);
      opacity: 0.07;
      animation: float 13s ease-in-out infinite reverse;
      pointer-events: none;
    }

    .login-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.7s ease both;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .login-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: var(--spacing-md);
    }

    .login-logo {
      height: 48px;
      color: var(--color-accent);
      display: block;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
      text-align: center;
      margin-bottom: var(--spacing-sm);
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      text-align: center;
      margin-bottom: var(--spacing-md);
    }

    /* ==================== Form ==================== */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: var(--spacing-sm);
    }

    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      color: var(--color-text-primary);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .form-input::placeholder {
      color: rgba(160,160,160,0.5);
    }

    /*.form-input:focus {
      border-color: var(--color-accent);
      background: rgba(244, 196, 48, 0.04);
      box-shadow: 0 0 0 3px rgba(244,196,48,0.12);
    }*/

    .form-input.error {
      border-color: var(--color-error-red);
      box-shadow: 0 0 0 3px rgba(255,77,77,0.12);
    }

    /* Password field wrapper */
    .input-wrap {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      padding: 4px;
      line-height: 0;
      transition: color 0.2s;
    }
    .toggle-password:hover { color: var(--color-text-primary); }

    .form-input.with-toggle { padding-right: 42px; }

    /* Error message */
    .form-error {
      font-size: 12px;
      color: var(--color-error-red);
      min-height: 16px;
      display: none;
    }
    .form-error.visible { display: block; }

    /* Global login error */
    .login-error-banner {
      background: rgba(255,77,77,0.1);
      border: 1px solid rgba(255,77,77,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #ff7070;
      margin-bottom: var(--spacing-sm);
      display: none;
    }
    .login-error-banner.visible { display: block; }

    /* ==================== Submit Button ==================== */
    .btn-submit {
      width: 100%;
      padding: 14px 28px;
      background: var(--color-accent);
      color: var(--color-bg-dark);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-top: var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover {
      background: var(--color-accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--color-accent-glow), 0 0 40px var(--color-accent-glow);
    }

    .btn-submit:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Spinner inside button */
    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10,10,10,0.3);
      border-top-color: var(--color-bg-dark);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .btn-spinner { display: block; }
    .btn-submit.loading .btn-text { opacity: 0.6; }

    /* ==================== Forgot link ==================== */
    .form-footer {
      text-align: center;
      margin-top: var(--spacing-sm);
      font-size: 13px;
      color: var(--color-text-secondary);
    }

    .form-footer a {
      color: var(--color-accent);
      text-decoration: none;
      transition: color 0.2s;
    }
    .form-footer a:hover { color: var(--color-accent-hover); }

    /* ==================== Accessibility ==================== */
    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
      border-radius: 6px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ==================== Mobile ==================== */
    @media (max-width: 480px) {
      .login-card {
        padding: var(--spacing-md);
        border-radius: 12px;
        margin: 0 4px;
      }
      .login-title { font-size: 20px; }
      .login-logo { height: 36px; }
    }
  </style>
</head>
<body>
  <main class="login-page" id="loginPage">
    <div class="login-card">

      <div class="login-logo-wrap" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" class="login-logo" viewBox="0 0 120 40"><path fill="currentColor" d="M96.68 30.58c-.52 0-.96-.17-1.31-.52s-.53-.78-.53-1.3.18-.95.53-1.3.79-.52 1.31-.52.96.17 1.31.52.53.78.53 1.3-.18.95-.53 1.3-.79.52-1.31.52M101 30.36v-9.99h3.48v1.91h.11c.18-.71.47-1.23.86-1.55s.86-.49 1.39-.49c.15 0 .31.01.46.04s.3.06.45.11v3.06c-.18-.07-.4-.11-.66-.14s-.48-.04-.67-.04c-.35 0-.67.08-.95.24s-.5.38-.66.66-.24.62-.24 1v5.2h-3.59ZM112.42 30.49c-.7 0-1.32-.16-1.84-.48s-.93-.77-1.22-1.33-.43-1.21-.43-1.94v-6.36h3.59v5.61c0 .49.13.88.38 1.17s.6.42 1.05.42c.3 0 .55-.06.77-.19s.38-.31.5-.55.18-.52.18-.85v-5.61h3.59v9.99h-3.37l-.07-2.56h.11c-.23.76-.59 1.39-1.10 1.91s-1.22.77-2.14.77M19.98 15.21c-.61-.42-1.37-.64-2.27-.64s-1.65.21-2.26.64c-.61.42-1.08 1.05-1.39 1.88-.32.83-.48 1.84-.48 3.04s.16 2.19.48 3.02c.32.82.78 1.44 1.39 1.87.61.42 1.36.64 2.26.64s1.66-.21 2.27-.64c.61-.42 1.07-1.05 1.39-1.87s.47-1.83.47-3.02-.16-2.21-.47-3.04-.78-1.45-1.39-1.88M83.8 19.26a1.25 1.25 0 0 0-1.77 0l-1.62 1.62-1.62-1.62a1.25 1.25 0 0 0-1.77 0 1.25 1.25 0 0 0 0 1.77l1.62 1.62-1.62 1.62a1.25 1.25 0 0 0 0 1.77c.24.24.56.37.88.37s.64-.12.88-.37l1.62-1.62 1.62 1.62c.24.24.56.37.88.37s.64-.12.88-.37c.49-.49.49-1.28 0-1.77l-1.62-1.62 1.62-1.62c.49-.49.49-1.28 0-1.77Z"/><path fill="currentColor" d="m83.85.56-72.7 3.59C4.9 4.46.25 10.06 1.1 16.26l1.63 11.95c.7 5.17 5.05 9.08 10.26 9.23l68.12 2.01c5.33.16 9.96-3.64 10.84-8.9L94.9 13C96.03 6.28 90.66.23 83.85.57ZM26.12 25.73c-.86 1.52-2.03 2.68-3.49 3.46q-2.205 1.17-4.92 1.17c-2.715 0-3.46-.39-4.93-1.18s-2.63-1.94-3.49-3.47C8.43 24.19 8 22.32 8 20.11s.43-4.1 1.29-5.63 2.02-2.68 3.49-3.47 3.11-1.17 4.93-1.17 3.45.39 4.92 1.17 2.63 1.94 3.49 3.47 1.29 3.4 1.29 5.63-.43 4.09-1.29 5.61Zm17.56 4.37h-5.39v-8.42c0-.74-.19-1.33-.56-1.75s-.9-.64-1.58-.64c-.44 0-.82.1-1.15.29s-.58.46-.76.82-.27.78-.27 1.28v8.42h-5.39V10.12h5.25v8.11a6.6 6.6 0 0 1 1.4-2.16c.76-.77 1.83-1.16 3.21-1.16 1.06 0 1.99.24 2.77.72s1.39 1.15 1.82 2 .64 1.82.64 2.91v9.54Zm11.2-5.93h-9.36v-4.05h9.36zm16.93 5.93h-5.39v-8.42c0-.74-.19-1.33-.56-1.75s-.9-.64-1.58-.64c-.44 0-.82.1-1.15.29s-.58.46-.76.82-.27.78-.27 1.28v8.42h-5.39V15.11h5.05l.1 3.42c.34-.95.84-1.77 1.51-2.45.76-.77 1.83-1.16 3.21-1.16 1.06 0 1.99.24 2.77.72s1.39 1.15 1.82 2 .64 1.82.64 2.91v9.54Zm15.43-3.42c-.61 1.16-1.5 2.06-2.65 2.71s-2.54.97-4.17.97-3.02-.32-4.18-.97-2.05-1.55-2.66-2.71-.92-2.5-.92-4.04.31-2.88.92-4.04 1.5-2.06 2.66-2.71 2.56-.97 4.18-.97 3.02.32 4.17.97 2.03 1.55 2.65 2.71c.61 1.16.92 2.5.92 4.04s-.31 2.88-.92 4.04"/></svg>
      </div>

      <h1 class="login-title">Вход в&nbsp;аккаунт</h1>

      <div class="login-error-banner" id="loginErrorBanner" role="alert"></div>

      <form id="loginForm" novalidate autocomplete="on">

        <div class="form-group">
          <label class="form-label" for="loginEmail">Логин</label>
          <input
            class="form-input"
            type="text"
            id="loginEmail"
            name="username"
            autocomplete="username"
            placeholder="Введите логин или email"
            spellcheck="false"
            required
          >
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Пароль</label>
          <div class="input-wrap">
            <input
              class="form-input with-toggle"
              type="password"
              id="loginPassword"
              name="password"
              autocomplete="current-password"
              placeholder="Введите пароль"
              required
            >
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Показать пароль">
              <!-- Eye icon -->
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hidden by default) -->
              <svg id="eyeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-spinner" id="btnSpinner"></span>
          <span class="btn-text">Войти</span>
        </button>

      </form>
    </div>
  </main>
<script src="/js/main.js"></script>
</body>
</html>
